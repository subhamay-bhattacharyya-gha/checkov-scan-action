name: Smoke Test

# Guards against regressions where the action silently passes on plan-file scans.
# Generates a Terraform plan JSON with a known CKV_AWS_21 violation (S3 bucket
# missing versioning) and asserts Checkov reports at least one failed check.

on:
  pull_request:
    paths:
      - action.yaml
      - .github/workflows/smoke-test.yaml
  push:
    branches:
      - main
    paths:
      - action.yaml
      - .github/workflows/smoke-test.yaml
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  plan-file-scan:
    name: plan-file scan detects known violation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout action under test
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Write fixture with known CKV_AWS_21 violation
        run: |
          mkdir -p fixtures/tf
          cat > fixtures/tf/main.tf <<'TF'
          terraform {
            required_providers {
              aws = { source = "hashicorp/aws", version = "~> 5.0" }
            }
          }

          provider "aws" {
            region                      = "us-east-1"
            access_key                  = "mock"
            secret_key                  = "mock"
            skip_credentials_validation = true
            skip_requesting_account_id  = true
            skip_metadata_api_check     = true
            s3_use_path_style           = true
          }

          # CKV_AWS_21: S3 bucket without versioning enabled — should be flagged.
          resource "aws_s3_bucket" "unversioned" {
            bucket = "checkov-smoke-test-unversioned"
          }
          TF

      - name: Generate plan JSON
        working-directory: fixtures/tf
        run: |
          terraform init -input=false -backend=false
          terraform plan -out=tfplan.binary -input=false -refresh=false
          terraform show -json tfplan.binary > tfplan.json

      - name: Simulate artifact download round-trip
        # Mirrors the real-world failure mode: a plan downloaded as an artifact
        # lives in the workspace and must survive until Checkov runs.
        uses: actions/upload-artifact@v7
        with:
          name: smoke-plan
          path: fixtures/tf/tfplan.json
          retention-days: 1

      - uses: actions/download-artifact@v8
        with:
          name: smoke-plan
          path: fixtures/tf

      - name: Run checkov-scan-action against the plan
        id: scan
        uses: ./
        with:
          plan-file: fixtures/tf/tfplan.json
          soft-fail: true
          output-file-path: /github/workspace
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert SARIF reports at least one failed check
        run: |
          SARIF="${GITHUB_WORKSPACE}/results.sarif"
          if [[ ! -f "${SARIF}" ]]; then
            echo "::error::results.sarif not produced"
            exit 1
          fi

          TOTAL=$(jq '[.runs[].results[]] | length' "${SARIF}")
          echo "Total SARIF results: ${TOTAL}"

          HAS_VERSIONING=$(jq '[.runs[].results[] | select(.ruleId=="CKV_AWS_21")] | length' "${SARIF}")
          echo "CKV_AWS_21 findings: ${HAS_VERSIONING}"

          if [[ "${TOTAL}" -lt 1 ]]; then
            echo "::error::Expected >=1 Checkov finding, got 0. Plan-file scan is silently passing — regression of the clean-workspace bug."
            exit 1
          fi

          if [[ "${HAS_VERSIONING}" -lt 1 ]]; then
            echo "::warning::CKV_AWS_21 not among findings. Either the check is disabled in the central gist or the fixture no longer trips it."
          fi
