    #   id: checkov-scan-detector
    #   continue-on-error: true
    #   uses: subhamay-bhattacharyya-gha/terraform-checkov-scan-detector/.github/actions/tf-scanner@bug/GHA-0004-fix-resolve-missing-actio
    #   with:
    #     terraform_dir: ${{ github.workspace }}/${{ inputs.iac-dir }}
    #     github_token: ${{ inputs.github-token }}

    # - name: Debug Checkov Scan Detector Output
    #   shell: bash
    #   env:
    #     DETECTOR_OUTPUTS: ${{ toJSON(steps.checkov-scan-detector.outputs) }}
    #   run: |
    #     echo "::group::checkov-scan-detector outputs"
    #     echo "outcome: ${{ steps.checkov-scan-detector.outcome }}"
    #     echo "conclusion: ${{ steps.checkov-scan-detector.conclusion }}"
    #     echo "All outputs: ${DETECTOR_OUTPUTS}"
    #     echo "::endgroup::"

    #     echo "## Checkov Scan Detector" >> $GITHUB_STEP_SUMMARY
    #     echo "" >> $GITHUB_STEP_SUMMARY
    #     echo "| Property   | Value |" >> $GITHUB_STEP_SUMMARY
    #     echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
    #     echo "| Outcome    | \`${{ steps.checkov-scan-detector.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
    #     echo "| Conclusion | \`${{ steps.checkov-scan-detector.conclusion }}\` |" >> $GITHUB_STEP_SUMMARY
    #     echo "" >> $GITHUB_STEP_SUMMARY
    #     echo "<details>" >> $GITHUB_STEP_SUMMARY
    #     echo "<summary>All Outputs</summary>" >> $GITHUB_STEP_SUMMARY
    #     echo "" >> $GITHUB_STEP_SUMMARY
    #     echo '```json' >> $GITHUB_STEP_SUMMARY
    #     echo "${DETECTOR_OUTPUTS}" >> $GITHUB_STEP_SUMMARY
    #     echo '```' >> $GITHUB_STEP_SUMMARY
    #     echo "</details>" >> $GITHUB_STEP_SUMMARY

    - name: "Retrieve Gist Content"
      id: pull_gist
      shell: bash
      run: |
        CONTENT=$(curl -s \
          "https://gist.githubusercontent.com/bsubhamay/33218d3610939502b8fe69ee4858c575/raw/enabled-checkov-scans-ids.json")
        echo "Scan ID from Gist: $CONTENT"
        {
          echo "gist_content<<GIST_EOF"
          echo "$CONTENT"
          echo "GIST_EOF"
        } >> $GITHUB_OUTPUT

    - name: "Print Enabled Checkov Scan IDs"
      id: print_checkov_ids
      shell: bash
      run: |
        CONTENT='${{ steps.pull_gist.outputs.gist_content }}'
        # Extract all check IDs from the nested JSON
        IDS=$(echo "$CONTENT" | jq -r '.. | arrays | .[]' | sort -u)

        # Install checkov to retrieve check descriptions
        pip install -q checkov > /dev/null 2>&1

        # Get the full checkov check list
        CHECKOV_LIST=$(checkov --list 2>/dev/null)

        # Build a single table with all checks
        echo "## Enabled Checkov Scans" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| # | Cloud | Service | Check Id | Description |" >> $GITHUB_STEP_SUMMARY
        echo "|--:|-------|---------|----------|-------------|" >> $GITHUB_STEP_SUMMARY

        COUNT=0
        for CLOUD in $(echo "$CONTENT" | jq -r 'keys[]'); do
          for SERVICE in $(echo "$CONTENT" | jq -r --arg c "$CLOUD" '.[$c] | keys[]'); do
            for ID in $(echo "$CONTENT" | jq -r --arg c "$CLOUD" --arg s "$SERVICE" '.[$c][$s][]'); do
              DESC=$(echo "$CHECKOV_LIST" | grep "$ID" | sed -n "1s/.*${ID}[[:space:]]*//p" | sed 's/|//g' | xargs)
              if [ -z "$DESC" ]; then
                DESC="N/A"
              fi
              COUNT=$((COUNT + 1))
              echo "| ${COUNT} | ${CLOUD} | ${SERVICE} | \`${ID}\` | ${DESC} |" >> $GITHUB_STEP_SUMMARY
            done
          done
        done

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Total: ${COUNT} check(s) enabled**" >> $GITHUB_STEP_SUMMARY

        # Build comma-separated list of all check IDs
        CHECK_IDS=$(echo "$CONTENT" | jq -r '[.. | arrays | .[]] | unique | join(",")')
        echo "check_ids=$CHECK_IDS" >> $GITHUB_OUTPUT
        echo "Enabled Check IDs: $CHECK_IDS"

    - name: "Run Checkov Scan"
      id: checkov-scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: ${{ github.workspace }}/${{ inputs.iac-dir }}
        soft_fail: ${{ inputs.soft-fail }}
        quiet: "true"
        framework: ${{ inputs.iac-framework }}
        check: ${{ steps.print_checkov_ids.outputs.check_ids }}
        download_external_modules: "true"
        # Output file for SARIF format, must be named as results.sarif for the report action to work
        output_format: "sarif"
        output_file_path: "."

    - name: Debug Checkov Scan Output
      if: success() || failure()
      shell: bash
      env:
        SCAN_OUTPUTS: ${{ toJSON(steps.checkov-scan.outputs) }}
      run: |
        echo "::group::checkov-scan outputs"
        echo "outcome: ${{ steps.checkov-scan.outcome }}"
        echo "conclusion: ${{ steps.checkov-scan.conclusion }}"
        echo "All outputs: ${SCAN_OUTPUTS}"
        echo "results.sarif exists: $(test -f results.sarif && echo 'yes' || echo 'no')"
        if [ -f results.sarif ]; then
          echo "results.sarif size: $(wc -c < results.sarif) bytes"
          echo "results.sarif preview (first 50 lines):"
          head -50 results.sarif
        fi
        echo "::endgroup::"

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v4
      # Upload only when the SARIF file was actually produced by the Checkov scan.
      if: (success() || failure()) && hashFiles('results.sarif') != ''
      with:
        sarif_file: results.sarif
        token: ${{ inputs.github-token }}
