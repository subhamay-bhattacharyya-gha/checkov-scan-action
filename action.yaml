name: "Reusable Checkov IaC Scan"
description: "Reusable GitHub Action to run Checkov against a specified IaC directory for security and compliance checks."

inputs:
  release-tag:
    description: "Git release tag to check out. If omitted, the latest commit on the default branch is used."
    required: false
    type: string

  iac-dir:
    description: "The directory path of the IAC file."
    required: true
    type: string
    default: "iac"

  iac-framework:
    description: "IAC Framework - Accepted values: cloudformation, terraform, kubernetes etc."
    required: true
    type: string
    default: "terraform"

  soft-fail:
    description: "If true, Checkov scan will not fail the pipeline"
    required: false
    type: boolean
    default: true

  github-token:
    description: "GitHub token used for API calls (pass secrets.GITHUB_TOKEN from the caller workflow)."
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: "Set Checkout Ref"
      id: set-ref
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        REPO="${GITHUB_REPOSITORY}"
        TAG="${{ inputs.release-tag }}"
        if [[ -n "${TAG}" ]]; then
          # Check if the ref exists as a tag or branch in the repo
          if git ls-remote --tags --heads "https://github.com/${REPO}.git" "${TAG}" | grep -q "${TAG}"; then
            echo "Ref '${TAG}' found in ${REPO}."
            echo "ref=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "::warning::Ref '${TAG}' does not exist in ${REPO}. Falling back to '${GITHUB_REF_NAME}'."
            echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
        else
          echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        fi

    - name: "Checkout Repo"
      id: checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.set-ref.outputs.ref }}

    - name: Ensure results.sarif is clean
      id: clean-results
      shell: bash
      run: |
        if [ -d "results.sarif" ]; then
          echo "Removing existing results.sarif directory..."
          rm -rf results.sarif
        fi

    # Custom Checkov Scan Detector step to determine if a scan should be run based on the presence of IaC files in the specified directory.
    # This will be implemented as a separate action in the future, but for now it's included here as a placeholder to demonstrate the intended functionality.
    # ------------------
