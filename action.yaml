name: "Reusable Checkov IaC Scan"
description: "Reusable GitHub Action to run Checkov against a specified IaC directory for security and compliance checks."

inputs:
  release-tag:
    description: "Git release tag to check out. If omitted, the latest commit on the default branch is used."
    required: false
    type: string

  iac-dir:
    description: "The directory path of the IAC file."
    required: true
    type: string
    default: "iac"

  iac-framework:
    description: "IAC Framework - Accepted values: cloudformation, terraform, kubernetes etc."
    required: true
    type: string
    default: "cloudformation"

  soft-fail:
    description: "If true, Checkov scan will not fail the pipeline"
    required: false
    type: boolean
    default: true

  github-token:
    description: "GitHub token used for API calls (pass secrets.GITHUB_TOKEN from the caller workflow)."
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: "Set Checkout Ref"
      id: set-ref
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        REPO="${GITHUB_REPOSITORY}"
        TAG="${{ inputs.release-tag }}"
        if [[ -n "${TAG}" ]]; then
          # Check if the ref exists as a tag or branch in the repo
          if git ls-remote --tags --heads "https://github.com/${REPO}.git" "${TAG}" | grep -q "${TAG}"; then
            echo "Ref '${TAG}' found in ${REPO}."
            echo "ref=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "::warning::Ref '${TAG}' does not exist in ${REPO}. Falling back to '${GITHUB_REF_NAME}'."
            echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
        else
          echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        fi

    - name: "Checkout Repo"
      id: checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.set-ref.outputs.ref }}

    - name: Ensure results.sarif is clean
      id: clean-results
      shell: bash
      run: |
        if [ -d "results.sarif" ]; then
          echo "Removing existing results.sarif directory..."
          rm -rf results.sarif
        fi

    - name: Run Terraform Checkov Scan Detector
      id: checkov-scan-detector
      continue-on-error: true
      uses: subhamay-bhattacharyya-gha/terraform-checkov-scan-detector/.github/actions/tf-scanner@v1.0.0
      with:
        terraform_dir: ${{ github.workspace }}/${{ inputs.iac-dir }}
        github_token: ${{ inputs.github-token }}

    - name: Debug Checkov Scan Detector Output
      shell: bash
      run: |
        echo "::group::checkov-scan-detector outputs"
        echo "outcome: ${{ steps.checkov-scan-detector.outcome }}"
        echo "conclusion: ${{ steps.checkov-scan-detector.conclusion }}"
        echo "All outputs: ${{ toJSON(steps.checkov-scan-detector.outputs) }}"
        echo "::endgroup::"

    - name: "Run Checkov Scan"
      id: checkov-scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: ${{ github.workspace }}/${{ inputs.iac-dir }}
        soft_fail: ${{ inputs.soft-fail }}
        quiet: "true"
        framework: ${{ inputs.iac-framework }}
        # Output file for SARIF format, must be named as results.sarif for the report action to work
        output_format: "sarif"
        output_file_path: "."

    - name: Debug Checkov Scan Output
      if: success() || failure()
      shell: bash
      run: |
        echo "::group::checkov-scan outputs"
        echo "outcome: ${{ steps.checkov-scan.outcome }}"
        echo "conclusion: ${{ steps.checkov-scan.conclusion }}"
        echo "All outputs: ${{ toJSON(steps.checkov-scan.outputs) }}"
        echo "results.sarif exists: $(test -f results.sarif && echo 'yes' || echo 'no')"
        if [ -f results.sarif ]; then
          echo "results.sarif size: $(wc -c < results.sarif) bytes"
          echo "results.sarif preview (first 50 lines):"
          head -50 results.sarif
        fi
        echo "::endgroup::"

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v4
      # Upload only when the SARIF file was actually produced by the Checkov scan.
      if: (success() || failure()) && hashFiles('results.sarif') != ''
      with:
        sarif_file: results.sarif
        token: ${{ inputs.github-token }}
